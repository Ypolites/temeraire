<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temeraire : Le JDR — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="body-pattern-page">

  <!-- Navigation minimale -->
  <nav class="app-nav">
    <div class="nav-brand">
      ⚓ <span>Temeraire <span class="brand-accent">·</span> JDR</span>
    </div>
    <div class="nav-user" id="navUser"></div>
  </nav>

  <div class="page-content page-content--narrow">

    <div class="page-header">
      <h1>Bienvenue à bord</h1>
    </div>

    <div class="section-card">
      <div class="section-title">
        <div class="title-ornament"></div>
        Connexion à votre campagne
      </div>

      <p class="text-muted" style="margin-bottom:1.25rem;">
        Connectez-vous pour rejoindre votre campagne Temeraire : Le JDR, accéder à votre fiche de personnage,
        au salon de jeu et à la bibliothèque de documents.
      </p>

      <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">

        <!-- Connexion -->
        <div style="flex:1;min-width:260px;">
          <h2 style="font-size:1rem;margin-bottom:0.75rem;">Connexion</h2>

          <form id="loginForm">
            <div class="field-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" class="field-input" placeholder="vous@exemple.fr" required />
            </div>
            <div class="field-group">
              <label for="loginPassword">Mot de passe</label>
              <input type="password" id="loginPassword" class="field-input" placeholder="Votre mot de passe" required />
            </div>
            <div class="field-group">
              <button type="submit" class="btn-primary" style="width:100%;">Se connecter</button>
            </div>
          </form>

          <div id="loginError" class="text-muted" style="color:var(--danger);font-size:0.85rem;margin-top:0.5rem;display:none;"></div>
        </div>

        <!-- Inscription -->
        <div style="flex:1;min-width:260px;">
          <h2 style="font-size:1rem;margin-bottom:0.75rem;">Créer un compte</h2>

          <form id="registerForm">
            <div class="field-group">
              <label for="registerUsername">Nom d'utilisateur</label>
              <input type="text" id="registerUsername" class="field-input" placeholder="CapitaineLaurence" required />
            </div>
            <div class="field-group">
              <label for="registerEmail">Email</label>
              <input type="email" id="registerEmail" class="field-input" placeholder="vous@exemple.fr" required />
            </div>
            <div class="field-group">
              <label for="registerPassword">Mot de passe</label>
              <input type="password" id="registerPassword" class="field-input" placeholder="Au moins 12 caractères" required />
            </div>
            <div class="field-group">
              <button type="submit" class="btn-save" style="width:100%;">Créer le compte</button>
            </div>
          </form>

          <div id="registerInfo" class="text-muted" style="font-size:0.85rem;margin-top:0.5rem;"></div>
        </div>

      </div>
    </div>

  </div>

  <script>
    // Affiche un éventuel user déjà en session (utile en dev)
    (function () {
      const cu = sessionStorage.getItem('currentUser');
      if (cu) {
        const navUser = document.getElementById('navUser');
        if (navUser) navUser.textContent = cu;
      }
    })();

    async function apiRequest(path, method, body) {
      const res = await fetch(path, {
        method,
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) {
        const errors = data.errors || [data.message || 'Erreur inconnue.'];
        throw new Error(errors.join('\\n'));
      }
      return data;
    }

    // Connexion
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';
      errorEl.textContent = '';

      try {
        const data = await apiRequest('/auth/login', 'POST', { email, password });

        // Stockage simple en session (v1)
        if (data.user) {
          sessionStorage.setItem('currentUser', data.user.username || data.user.email);
        }
        if (data.token) {
          sessionStorage.setItem('authToken', data.token);
        }

        // Redirection vers le salon
        window.location.href = 'chat.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });

    // Inscription
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('registerUsername').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const infoEl = document.getElementById('registerInfo');
      infoEl.style.color = 'var(--muted)';
      infoEl.textContent = 'Création du compte…';

      try {
        await apiRequest('/auth/register', 'POST', { username, email, password });
        infoEl.style.color = 'var(--forest)';
        infoEl.textContent = 'Compte créé. Vous pouvez maintenant vous connecter avec vos identifiants.';
      } catch (err) {
        infoEl.style.color = 'var(--danger)';
        infoEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
