<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temeraire : Le JDR — Salon de jeu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Chat Layout ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--ivory);
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b8a06a' fill-opacity='0.05'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
    }

    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem;
      height: calc(100vh - 56px);
    }

    /* ── Session Banner ── */
    .session-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      flex-shrink: 0;
    }

    .session-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .session-icon {
      width: 34px;
      height: 34px;
      background: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .session-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--navy);
    }

    .session-meta {
      font-family: 'Lato', sans-serif;
      font-size: 0.73rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Message List ── */
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .load-more-btn {
      align-self: center;
      margin-bottom: 1.5rem;
      padding: 0.5rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .load-more-btn:hover {
      background: var(--parchment);
      color: var(--navy);
      border-color: var(--navy);
    }

    .load-more-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Individual Message Rows ── */
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 2rem;
      animation: msgIn 0.3s ease forwards;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.gm { flex-direction: row; }
    .msg-row.player { flex-direction: row-reverse; }
    .msg-row.system {
      justify-content: center;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar column */
    .msg-avatar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
      width: 72px;
    }

    .msg-avatar {
      width: 68px;
      height: 68px;
      border-radius: 4px;
      object-fit: cover;
      border: 2px solid var(--border);
      background: var(--parchment);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .msg-avatar svg,
    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .msg-avatar-name {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    /* Message bubble column */
    .msg-content-col {
      flex: 1;
      min-width: 0;
      max-width: 680px;
    }

    .msg-caption {
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .msg-row.player .msg-caption { text-align: right; }

    .msg-bubble {
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem 1.2rem;
      position: relative;
      box-shadow: var(--shadow-sm);
    }

    .msg-row.gm .msg-bubble {
      border-left: 3px solid var(--navy);
      background: linear-gradient(135deg, #f0e8d6 0%, #ebe0c4 100%);
    }

    .msg-row.player .msg-bubble {
      border-right: 3px solid var(--gold);
      background: linear-gradient(135deg, #f7f3eb 0%, #f0e8d6 100%);
    }

    .msg-text {
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--navy);
    }

    .msg-text p + p { margin-top: 0.7rem; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.6rem;
    }

    .msg-row.player .msg-meta { justify-content: flex-end; }

    .msg-time {
      font-family: 'Lato', sans-serif;
      font-size: 0.68rem;
      color: var(--muted-light);
    }

    /* ── System Message ── */
    .msg-system {
      background: rgba(122, 110, 94, 0.08);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1.4rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      text-align: center;
      max-width: 500px;
    }

    /* ── Dice Request Block ── */
    .dice-request {
      margin-top: 1rem;
      background: var(--ivory);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }

    .dice-request-label {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dice-input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .dice-input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--navy);
      background: var(--parchment);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      outline: none;
      letter-spacing: 0.05em;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .dice-input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(31, 48, 94, 0.1);
    }

    .btn-launch {
      padding: 0.5rem 1.1rem;
      background: var(--navy);
      color: var(--ivory);
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
    }

    .btn-launch:hover:not(:disabled) { background: var(--navy-light); }
    .btn-launch:disabled { opacity: 0.45; cursor: not-allowed; }

    .dice-error {
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      color: var(--danger);
      margin-top: 0.4rem;
      display: none;
    }

    .dice-error.visible { display: block; }

    /* ── Dice Animation Overlay ── */
    .dice-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 28, 60, 0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    .dice-overlay.visible { display: flex; }

    .dice-roll-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .dice-roll-faces { display: flex; gap: 1rem; }

    .die-face {
      width: 60px;
      height: 60px;
      background: var(--navy);
      border: 2px solid var(--gold);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ivory);
      animation: dieShake 0.2s ease-in-out infinite alternate;
    }

    @keyframes dieShake {
      from { transform: rotate(-12deg) scale(1); }
      to   { transform: rotate(12deg) scale(1.08); }
    }

    .die-face:nth-child(2) { animation-delay: 0.07s; animation-direction: alternate-reverse; }
    .die-face:nth-child(3) { animation-delay: 0.14s; }

    .dice-roll-text {
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-light);
      animation: fadeFlicker 0.8s ease-in-out infinite alternate;
    }

    @keyframes fadeFlicker {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* ── Composer ── */
    .composer-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 0.9rem 0;
      background: var(--ivory);
    }

    .composer-card {
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .composer-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem 0;
    }

    .mood-selector { position: relative; }

    .mood-thumb {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      border: 2px solid var(--border-dark);
      background: var(--ivory);
      cursor: pointer;
      overflow: hidden;
      transition: border-color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .mood-thumb:hover { border-color: var(--gold); }

    .mood-dropdown {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem;
      box-shadow: var(--shadow-lg);
      z-index: 30;
      width: 220px;
    }

    .mood-dropdown.open { display: block; }

    .mood-dropdown-title {
      font-family: 'Lato', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .mood-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.35rem;
    }

    .mood-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      cursor: pointer;
      padding: 0.3rem 0.2rem;
      border-radius: 2px;
      transition: background var(--transition);
      border: 1px solid transparent;
    }

    .mood-option:hover { background: var(--parchment-dark); }
    .mood-option.selected { border-color: var(--gold); background: rgba(184, 150, 62, 0.1); }

    .mood-option-img {
      width: 32px;
      height: 32px;
      border-radius: 2px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      overflow: hidden;
    }

    .mood-option-label {
      font-family: 'Lato', sans-serif;
      font-size: 0.58rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
    }

    .caption-input {
      flex: 1;
      padding: 0.45rem 0.7rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      background: var(--ivory);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color var(--transition);
    }

    .caption-input:focus { border-color: var(--navy); color: var(--navy); }
    .caption-input::placeholder { color: var(--muted-light); }

    .composer-main {
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
      padding: 0.6rem 1rem 0.75rem;
    }

    .message-input {
      flex: 1;
      resize: none;
      padding: 0.6rem 0.75rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.93rem;
      line-height: 1.5;
      color: var(--navy);
      background: var(--ivory);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      max-height: 130px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .message-input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(31, 48, 94, 0.1);
    }

    .message-input::placeholder { color: var(--muted-light); }

    .btn-send {
      padding: 0.6rem 1.4rem;
      background: var(--navy);
      color: var(--ivory);
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
      height: 38px;
    }

    .btn-send:hover { background: var(--navy-light); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .msg-avatar { width: 48px; height: 48px; }
      .msg-avatar-col { width: 52px; }
      .msg-bubble { padding: 0.75rem 0.9rem; }
      .msg-text { font-size: 0.88rem; }
    }

    @media (max-width: 480px) {
      .chat-wrapper { padding: 0 0.5rem; }
      .composer-top { padding: 0.5rem 0.75rem 0; }
      .composer-main { padding: 0.5rem 0.75rem 0.6rem; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="app-nav">
    <div class="nav-brand">
      ⚓ <span>Temeraire <span class="brand-accent">·</span> JDR</span>
    </div>
    <div class="nav-links">
      <a href="chat.html" class="nav-link active">Salon</a>
      <a href="character.html" class="nav-link">Personnage</a>
      <a href="library.html" class="nav-link">Bibliothèque</a>
    </div>
    <div class="nav-user" id="navUser"></div>
  </nav>

  <!-- Chat wrapper -->
  <div class="chat-wrapper">

    <!-- Session banner -->
    <div class="session-banner">
      <div class="session-info">
        <div class="session-icon">🐉</div>
        <div>
          <div class="session-name" id="sessionNameDisplay">Chargement…</div>
          <div class="session-meta" id="sessionMeta">Session en cours</div>
        </div>
      </div>
      <div id="sessionSyncBadge" class="sync-badge synced">
        <div class="dot"></div>Synchronisé
      </div>
    </div>

    <!-- Message list -->
    <div class="message-list" id="messageList">
      <button class="load-more-btn" id="loadMoreBtn">↑ Charger plus</button>
    </div>

    <!-- Composer -->
    <div class="composer-area">
      <div class="composer-card">
        <div class="composer-top">
          <div class="mood-selector">
            <div class="mood-thumb" id="moodThumb" title="Choisir une humeur">😐</div>
            <div class="mood-dropdown" id="moodDropdown">
              <div class="mood-dropdown-title">Humeur du personnage</div>
              <div class="mood-grid" id="moodGrid"></div>
            </div>
          </div>
          <input
            type="text"
            class="caption-input"
            id="captionInput"
            placeholder="*Didacticule en ajustant ses gants…*"
            maxlength="120"
          />
        </div>
        <div class="composer-main">
          <textarea
            class="message-input"
            id="messageInput"
            placeholder="Écrivez votre message…"
            rows="2"
          ></textarea>
          <button class="btn-send" id="sendBtn">Envoyer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Dice animation overlay -->
  <div class="dice-overlay" id="diceOverlay">
    <div class="dice-roll-visual">
      <div class="dice-roll-faces" id="diceRollFaces">
        <div class="die-face" id="die1">?</div>
        <div class="die-face" id="die2">?</div>
        <div class="die-face" id="die3">?</div>
      </div>
      <div class="dice-roll-text">Lancer en cours…</div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    /* ══════════════════════════════════════════
       chat.js — Temeraire JDR
       Branché sur l'API réelle.
       ══════════════════════════════════════════ */

    // ── Garde : rediriger si pas de token ──
    const AUTH_TOKEN = sessionStorage.getItem('authToken');
    if (!AUTH_TOKEN) {
      window.location.href = 'login.html';
    }

    // ── Utilitaire API ──
    async function apiRequest(path, method = 'GET', body = null) {
      const headers = { 'Content-Type': 'application/json' };
      if (AUTH_TOKEN) headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;

      const res = await fetch(path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) {
        const errors = data.errors || [data.message || 'Erreur inconnue.'];
        throw new Error(errors.join('\n'));
      }
      return data;
    }

    // ── État global ──
    const SESSION_ID   = sessionStorage.getItem('sessionId');
    const SESSION_NAME = sessionStorage.getItem('sessionName') || 'Session';
    let currentPage    = 1;
    let totalPages     = 1;
    let isLoading      = false;

    // ── Nav user ──
    const cu = sessionStorage.getItem('currentUser');
    if (cu) document.getElementById('navUser').textContent = cu;

    // ── Afficher nom de session ──
    document.getElementById('sessionNameDisplay').textContent = SESSION_NAME;

    // ── Mood definitions ──
    const MOODS = [
      { label: 'Neutre',      emoji: '😐', value: 'neutral'    },
      { label: 'Heureux·se',  emoji: '😊', value: 'happy'      },
      { label: 'Triste',      emoji: '😢', value: 'sad'        },
      { label: 'En colère',   emoji: '😠', value: 'angry'      },
      { label: 'Effrayé·e',   emoji: '😨', value: 'scared'     },
      { label: 'Surpris·e',   emoji: '😲', value: 'surprised'  },
      { label: 'Déterminé·e', emoji: '😤', value: 'determined' },
      { label: 'Blessé·e',    emoji: '🤕', value: 'hurt'       },
      { label: 'Moqueur·se',  emoji: '😏', value: 'mocking'    },
      { label: 'Concentré·e', emoji: '🧐', value: 'focus'      },
    ];

    let selectedMood = MOODS[0];

    // Build mood grid
    const moodGrid = document.getElementById('moodGrid');
    MOODS.forEach((m, i) => {
      const opt = document.createElement('div');
      opt.className = 'mood-option' + (i === 0 ? ' selected' : '');
      opt.innerHTML = `
        <div class="mood-option-img">${m.emoji}</div>
        <div class="mood-option-label">${m.label}</div>
      `;
      opt.addEventListener('click', () => {
        document.querySelectorAll('.mood-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedMood = m;
        document.getElementById('moodThumb').textContent = m.emoji;
        document.getElementById('moodDropdown').classList.remove('open');
      });
      moodGrid.appendChild(opt);
    });

    document.getElementById('moodThumb').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('moodDropdown').classList.toggle('open');
    });
    document.addEventListener('click', () => {
      document.getElementById('moodDropdown').classList.remove('open');
    });

    // ── Helpers ──
    const FORMAT_TIME = (d) => new Date(d).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    function getMoodEmoji(value) {
      const m = MOODS.find(m => m.value === value);
      return m ? m.emoji : '👤';
    }

    function getMoodLabel(value) {
      const m = MOODS.find(m => m.value === value);
      return m ? m.label : 'Joueur';
    }

    function gmAvatar() {
      return `<svg viewBox="0 0 68 68" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;background:#1f305e">
        <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-size="32">🐉</text>
      </svg>`;
    }

    function playerAvatar(moodValue) {
      const emoji = getMoodEmoji(moodValue);
      return `<div style="width:100%;height:100%;background:var(--parchment-dark);display:flex;align-items:center;justify-content:center;font-size:1.8rem">${emoji}</div>`;
    }

    // ── Rendu d'un message ──
    function renderMessage(msg, prepend = false) {
      const list = document.getElementById('messageList');
      const row  = document.createElement('div');

      // Message système local (résultat de dé, etc.)
      if (msg.type === 'system') {
        row.className = 'msg-row system';
        row.innerHTML = `<div class="msg-system">${msg.text}</div>`;
        if (prepend) {
          list.insertBefore(row, list.firstChild.nextSibling);
        } else {
          list.appendChild(row);
        }
        return;
      }

      // Message API (isGmMessage) ou message joueur local
      const isGM = msg.isGmMessage === true || msg.type === 'gm';
      row.className = `msg-row ${isGM ? 'gm' : 'player'}`;
      if (msg.id) row.dataset.id = msg.id;

      const timeStr   = FORMAT_TIME(msg.createdAt || msg.time || new Date());
      const moodValue = msg.selectedMood || (msg.mood ? msg.mood.value : null);

      if (isGM) {
        row.innerHTML = `
          <div class="msg-avatar-col">
            <div class="msg-avatar">${gmAvatar()}</div>
            <div class="msg-avatar-name">MJ</div>
          </div>
          <div class="msg-content-col">
            <div class="msg-bubble">
              <div class="msg-text">${msg.content || msg.text}</div>
              <div class="msg-meta">
                <span class="msg-time">${timeStr}</span>
              </div>
            </div>
          </div>
        `;
      } else {
        const captionHtml = msg.caption
          ? `<div class="msg-caption">${msg.caption}</div>`
          : '';
        row.innerHTML = `
          <div class="msg-content-col" style="text-align:right">
            ${captionHtml}
            <div class="msg-bubble">
              <div class="msg-text">${msg.content || msg.text}</div>
              <div class="msg-meta" style="justify-content:flex-end">
                <span class="msg-time">${timeStr}</span>
              </div>
            </div>
          </div>
          <div class="msg-avatar-col">
            <div class="msg-avatar">${playerAvatar(moodValue)}</div>
            <div class="msg-avatar-name">${getMoodLabel(moodValue)}</div>
          </div>
        `;
      }

      if (prepend) {
        const btn = document.getElementById('loadMoreBtn');
        list.insertBefore(row, btn.nextSibling);
      } else {
        list.appendChild(row);
      }
    }

    // ── Chargement des messages depuis l'API ──
    async function loadMessages(page = 1, prepend = false) {
      if (!SESSION_ID || isLoading) return;
      isLoading = true;

      setSyncBadge('pending');

      try {
        const data = await apiRequest(`/sessions/${SESSION_ID}/messages?page=${page}`);
        const messages = data.messages || [];
        totalPages = data.pagination?.totalPages || 1;
        currentPage = page;

        const msgList = document.getElementById('messageList');
        const scrollBefore = msgList.scrollHeight;

        if (prepend) {
          // Insérer dans l'ordre chronologique après le bouton
          messages.forEach(m => renderMessage(m, true));
          msgList.scrollTop = msgList.scrollHeight - scrollBefore;
        } else {
          messages.forEach(m => renderMessage(m));
          msgList.scrollTop = msgList.scrollHeight;
        }

        // Mettre à jour le bouton "charger plus"
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (currentPage >= totalPages) {
          loadMoreBtn.disabled = true;
          loadMoreBtn.textContent = 'Tout affiché';
        }

        setSyncBadge('synced');
      } catch (err) {
        console.error('[chat] loadMessages error:', err);
        setSyncBadge('failed');
      } finally {
        isLoading = false;
      }
    }

    // ── Sync badge ──
    function setSyncBadge(state) {
      const badge = document.getElementById('sessionSyncBadge');
      const labels = {
        synced:  { cls: 'synced',  txt: 'Synchronisé'  },
        pending: { cls: 'pending', txt: 'En attente'    },
        failed:  { cls: 'failed',  txt: 'Échec sync'    },
      };
      const s = labels[state] || labels.synced;
      badge.className = `sync-badge ${s.cls}`;
      badge.innerHTML = `<div class="dot"></div>${s.txt}`;
    }

    // ── Charger plus ──
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      if (currentPage < totalPages) {
        loadMessages(currentPage + 1, true);
      }
    });

    // ── Envoyer un message ──
    async function sendMessage() {
      const text = document.getElementById('messageInput').value.trim();
      if (!text || !SESSION_ID) return;

      const caption = document.getElementById('captionInput').value.trim();
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;

      // Affichage optimiste immédiat
      const optimisticMsg = {
        type:         'player',
        content:      text,
        caption,
        selectedMood: selectedMood.value,
        createdAt:    new Date().toISOString(),
      };
      renderMessage(optimisticMsg);

      const msgList = document.getElementById('messageList');
      msgList.scrollTop = msgList.scrollHeight;

      // Vider les inputs
      document.getElementById('messageInput').value = '';
      document.getElementById('messageInput').style.height = 'auto';
      document.getElementById('captionInput').value = '';

      try {
        setSyncBadge('pending');
        await apiRequest(`/sessions/${SESSION_ID}/messages`, 'POST', {
          content:      text,
          caption:      caption || undefined,
          selectedMood: selectedMood.value,
        });

        // Appeler le MJ IA pour obtenir une réponse, en utilisant la même session.
        try {
          const res = await fetch('/llm/test', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              message: text,
              sessionId: SESSION_ID,
            }),
          });

          const data = await res.json().catch(() => ({}));
          if (res.ok && data.success && data.reply) {
            // Rendu immédiat de la réponse MJ
            renderMessage({
              type: 'gm',
              content: data.reply,
              createdAt: new Date().toISOString(),
            });

            const msgListAfter = document.getElementById('messageList');
            msgListAfter.scrollTop = msgListAfter.scrollHeight;
          } else {
            console.error('[chat] llm/test error:', data);
          }
        } catch (llmErr) {
          console.error('[chat] erreur lors de l’appel LLM:', llmErr);
        }

        setSyncBadge('synced');
      } catch (err) {
        console.error('[chat] sendMessage error:', err);
        setSyncBadge('failed');
      } finally {
        sendBtn.disabled = false;
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    document.getElementById('messageInput').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 130) + 'px';
    });

    // ── Lancer de dés via l'API ──
    async function rollDice(command) {
      try {
        const data = await apiRequest('/dice/roll', 'POST', { command });
        return { valid: true, ...data };
      } catch (err) {
        return { valid: false, error: err.message };
      }
    }

    // ── Animation de dés ──
    async function runDiceAnimation(command) {
      // Parsing local pour l'animation visuelle
      const clean = command.replace(/\s+/g, '').toLowerCase().replace(/^\/roll/, '');
      const match = clean.match(/^(\d+)d(\d+)([+-]\d+)?$/);
      if (!match) return;

      const n = parseInt(match[1]);
      const x = parseInt(match[2]);

      const overlay  = document.getElementById('diceOverlay');
      const dieEls   = document.querySelectorAll('.die-face');
      const showCount = Math.min(n, 3);

      dieEls.forEach((d, i) => {
        d.style.display = i < showCount ? 'flex' : 'none';
        d.textContent = '?';
      });

      overlay.classList.add('visible');
      document.body.style.overflow = 'hidden';

      // Appel API pendant l'animation
      const resultPromise = rollDice(command);

      // Animation
      await new Promise(resolve => {
        let ticks = 0;
        const interval = setInterval(() => {
          dieEls.forEach((d, i) => {
            if (i < showCount) d.textContent = Math.floor(Math.random() * x) + 1;
          });
          ticks++;
          if (ticks >= 18) { clearInterval(interval); resolve(); }
        }, 100);
      });

      const result = await resultPromise;

      // Afficher résultat final
      setTimeout(() => {
        overlay.classList.remove('visible');
        document.body.style.overflow = '';

        if (result.valid) {
          renderMessage({
            type: 'system',
            text: `🎲 Résultat : <strong>${result.total}</strong> — ${result.breakdown}`,
          });
        } else {
          renderMessage({
            type: 'system',
            text: `⚠️ Erreur : ${result.error}`,
          });
        }

        const msgList = document.getElementById('messageList');
        msgList.scrollTop = msgList.scrollHeight;
      }, 600);
    }

    // ── Détecter /roll dans le message input ──
    document.getElementById('sendBtn').addEventListener('click', () => {}, false);
    document.getElementById('messageInput').addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        const text = document.getElementById('messageInput').value.trim();
        if (text.match(/^\/roll\s+\d+d\d+/i)) {
          e.preventDefault();
          document.getElementById('messageInput').value = '';
          await runDiceAnimation(text);
        }
      }
    });

    // ── Pas de session → message d'info ──
    if (!SESSION_ID) {
      renderMessage({
        type: 'system',
        text: 'Aucune session trouvée. Veuillez vous reconnecter.',
      });
      document.getElementById('loadMoreBtn').disabled = true;
    } else {
      // Chargement initial
      loadMessages(1);
    }
  </script>
</body>
